<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 일기 - 한 걸음씩</title>
<style>
  :root{
    --bg:#f4f7fb; --panel:#ffffff; --ink:#2b3a4a; --soft:#6b7d8f;
    --line:#dfe7ef; --primary:#5b8def; --primary-d:#4a78d6;
    --ok:#5fbf8f; --ok-d:#49a878; --warm:#f7c948; --pick:#eaf1ff;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:Pretendard,-apple-system,"Segoe UI",sans-serif;
    background:var(--bg); color:var(--ink); font-size:20px; line-height:1.5;
  }
  .wrap{max-width:640px; margin:0 auto; padding:16px 16px 120px;}
  header.app{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 6px; position:sticky; top:0; background:var(--bg); z-index:5;
  }
  header.app h1{font-size:22px; margin:0; letter-spacing:-0.3px;}
  .datechip{font-size:16px; color:var(--soft);}
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:22px; margin-bottom:16px;
  }
  /* 진행 막대 */
  .steps{display:flex; gap:8px; margin:6px 0 18px;}
  .steps .dot{flex:1; height:8px; border-radius:6px; background:var(--line);}
  .steps .dot.on{background:var(--primary);}
  .steps .dot.done{background:var(--ok);}
  .qhint{font-size:16px; color:var(--soft); margin:0 0 6px;}
  .question{font-size:26px; font-weight:700; margin:0 0 20px; letter-spacing:-0.4px;}
  /* 선택 카드 그리드 */
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
  .grid.three{grid-template-columns:repeat(3,1fr);}
  .choice{
    border:2px solid var(--line); background:#fff; border-radius:16px;
    padding:18px 10px; text-align:center; cursor:pointer; user-select:none;
    transition:transform .08s, border-color .12s, background .12s;
  }
  .choice:active{transform:scale(.97);}
  .choice.sel{border-color:var(--primary); background:var(--pick);}
  .choice .emo{font-size:40px; display:block; line-height:1.1;}
  .choice .lbl{font-size:19px; margin-top:6px; font-weight:600;}
  /* 입력 */
  input.type, textarea.type{
    width:100%; font-size:22px; font-family:inherit; color:var(--ink);
    border:2px solid var(--line); border-radius:14px; padding:14px 16px; background:#fff;
  }
  textarea.type{min-height:120px; resize:vertical;}
  input.type:focus,textarea.type:focus{outline:none; border-color:var(--primary);}
  /* 조립된 문장 미리보기 */
  .preview{
    background:#f0f6ff; border:2px dashed #bcd2f7; border-radius:16px;
    padding:18px 20px; font-size:24px; font-weight:600; margin-top:8px; min-height:30px;
    letter-spacing:-0.3px;
  }
  .preview .blank{color:var(--primary); border-bottom:3px solid var(--primary); padding:0 4px;}
  .preview .fade{color:var(--soft); font-weight:500;}
  /* 하단 버튼 바 */
  .bar{
    position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom)); display:flex; gap:10px;
    max-width:640px; margin:0 auto;
  }
  .btn{
    flex:1; border:none; border-radius:14px; padding:16px; font-size:20px; font-weight:700;
    font-family:inherit; cursor:pointer;
  }
  .btn.next{background:var(--primary); color:#fff;}
  .btn.next:active{background:var(--primary-d);}
  .btn.next:disabled{background:#c7d3e0; cursor:not-allowed;}
  .btn.back{flex:0 0 96px; background:#eef2f7; color:var(--soft);}
  .btn.done{background:var(--ok); color:#fff;}
  .btn.done:active{background:var(--ok-d);}
  /* 칭찬 오버레이 */
  .cheer{
    position:fixed; inset:0; background:rgba(244,247,251,.97); display:none;
    flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; z-index:20;
  }
  .cheer.show{display:flex;}
  .cheer .big{font-size:80px;}
  .cheer h2{font-size:30px; margin:14px 0 6px;}
  .cheer p{font-size:20px; color:var(--soft); margin:0 0 26px;}
  .cheer .finalbox{
    background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px;
    font-size:22px; font-weight:600; max-width:440px; width:100%; margin-bottom:24px; line-height:1.55;
  }
  /* 하단 탭 없는 링크 */
  .toplink{background:none; border:1px solid var(--line); border-radius:12px; padding:8px 12px;
    font-size:15px; color:var(--soft); cursor:pointer; font-family:inherit;}
  /* 달력/기록 */
  .cal{display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:10px;}
  .cal .cell{aspect-ratio:1; border:1px solid var(--line); border-radius:10px; display:flex;
    align-items:center; justify-content:center; font-size:15px; color:var(--soft); position:relative;}
  .cal .cell.has{background:var(--ok); color:#fff; border-color:var(--ok); cursor:pointer; font-weight:700;}
  .cal .head{border:none; color:var(--soft); font-size:14px; aspect-ratio:auto; padding:4px 0;}
  .diaryitem{border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:10px;}
  .diaryitem .d{font-size:15px; color:var(--soft); margin-bottom:4px;}
  .diaryitem .t{font-size:20px; font-weight:600; line-height:1.55;}
  /* 교사 화면 */
  .row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 0; border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .lvlbtns{display:flex; gap:6px; flex-wrap:wrap;}
  .lvlbtns button{border:2px solid var(--line); background:#fff; border-radius:10px; padding:8px 12px; font-size:16px; cursor:pointer; font-family:inherit; font-weight:600; color:var(--soft);}
  .lvlbtns button.cur{border-color:var(--primary); background:var(--pick); color:var(--primary-d);}
  .muted{color:var(--soft); font-size:16px;}
  h2.sec{font-size:20px; margin:2px 0 10px;}
  .stat{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:8px;}
  .stat .box{flex:1; min-width:120px; background:#f7fafd; border:1px solid var(--line); border-radius:14px; padding:14px;}
  .stat .box .n{font-size:26px; font-weight:800;}
  .stat .box .l{font-size:14px; color:var(--soft);}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">

  <header class="app">
    <h1 id="appTitle">오늘의 일기</h1>
    <div style="display:flex; gap:8px; align-items:center;">
      <span class="datechip" id="dateChip"></span>
      <button class="toplink" id="teacherLink">교사</button>
    </div>
  </header>

  <!-- ===== 학생 화면 ===== -->
  <section id="studentView">
    <div class="steps" id="stepDots"></div>
    <div class="card">
      <p class="qhint" id="qhint"></p>
      <h2 class="question" id="question"></h2>
      <div id="content"></div>
    </div>
  </section>

  <!-- ===== 기록(달력) 화면 ===== -->
  <section id="diaryView" class="hidden">
    <div class="card">
      <h2 class="sec">내가 쓴 일기</h2>
      <div class="cal" id="calendar"></div>
    </div>
    <div id="diaryList"></div>
  </section>

  <!-- ===== 교사/보호자 화면 ===== -->
  <section id="teacherView" class="hidden">
    <div class="card">
      <h2 class="sec">진행 현황</h2>
      <div class="stat">
        <div class="box"><div class="n" id="stTotal">0</div><div class="l">쓴 일기 수</div></div>
        <div class="box"><div class="n" id="stStreak">0</div><div class="l">연속 달성(일)</div></div>
        <div class="box"><div class="n" id="stLevel">1</div><div class="l">현재 단계</div></div>
      </div>
    </div>
    <div class="card">
      <h2 class="sec">단계 조정</h2>
      <p class="muted">학생 수준에 맞는 단계를 선택하세요. 잘 해내면 다음 단계로 올려 주세요.</p>
      <div class="lvlbtns" id="lvlBtns"></div>
      <div id="lvlDesc" class="muted" style="margin-top:12px;"></div>
    </div>
    <div class="card">
      <h2 class="sec">활동(그림 카드) 편집</h2>
      <p class="muted">학생이 고를 "한 일" 목록입니다. 관심사에 맞게 바꿔 주세요. (한 줄에 하나: 이모지 활동이름)</p>
      <textarea class="type" id="actEditor" style="min-height:150px;"></textarea>
      <button class="btn next" id="saveActs" style="margin-top:10px;">활동 목록 저장</button>
    </div>
    <div class="card">
      <h2 class="sec">데이터</h2>
      <button class="btn back" id="resetBtn" style="flex:1; color:#c0392b;">모든 기록 지우기</button>
    </div>
  </section>

</div>

<!-- 하단 버튼 바 -->
<div class="bar" id="bar"></div>

<!-- 칭찬 오버레이 -->
<div class="cheer" id="cheer">
  <div class="big">🎉</div>
  <h2 id="cheerTitle">잘했어요!</h2>
  <p id="cheerMsg">오늘의 일기를 완성했어요.</p>
  <div class="finalbox" id="finalText"></div>
  <button class="btn done" style="max-width:300px;" id="cheerClose">내 일기 보기</button>
</div>

<script>
/* =========================================================
   오늘의 일기 - 한 걸음씩
   자폐 스펙트럼 학생용 단계별 일기 쓰기 앱 (단일 파일)
   설계 원칙:
   - 예측 가능성: 매일 동일한 화면 순서
   - 무오류 학습: 정답/오답 없음, 항상 성공으로 마무리
   - 비계(scaffolding): 단답형 질문에 단어로 답 → 앱이 문장 조립
   - 목표 확장: [한 일] 먼저, 단계가 오르면 [느낌/생각] 추가
   ========================================================= */

/* ---------- 저장소 ---------- */
const KEY = 'diary_app_v1';
function load(){
  const raw = localStorage.getItem(KEY);
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  return { level:1, entries:{}, activities:null };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(DB)); }
let DB = load();

/* ---------- 기본 활동(그림) 카드 ---------- */
const DEFAULT_ACTS = [
  '🏫 학교에 갔어요','🍚 밥을 먹었어요','📖 책을 읽었어요','🎮 게임을 했어요',
  '🚶 산책을 했어요','🧩 놀이를 했어요','📺 텔레비전을 봤어요','😴 낮잠을 잤어요',
  '🧼 청소를 했어요','🎨 그림을 그렸어요','🎵 노래를 들었어요','🐶 강아지랑 놀았어요'
];
function getActs(){
  if(DB.activities && DB.activities.length) return DB.activities;
  return DEFAULT_ACTS;
}

/* ---------- 느낌 선택지(2단계 목표: 느낌 추가) ---------- */
const FEELINGS = [
  '😀 즐거웠어요','🙂 좋았어요','😌 편안했어요','😮 신기했어요',
  '😢 슬펐어요','😠 화났어요','😐 그저 그랬어요','🥱 피곤했어요'
];

/* ---------- 장소 / 사람 선택지 (단답형 질문 발판) ---------- */
const PLACES = ['🏫 학교','🏠 집','🏞️ 공원','🏪 가게','🛝 놀이터','🚗 밖'];
const PEOPLE = ['👩‍🏫 선생님','👨‍👩‍👧 가족','👫 친구','🙋 혼자','👵 할머니','🐶 반려동물'];

/* =========================================================
   단계(레벨) 정의 — 학생 수준에 맞춰 발판을 점점 줄임
   레벨1: 한 일 그림 고르기만 → 앱이 완전한 문장 조립
   레벨2: 한 일 + 장소/사람 단답 선택 → 더 긴 문장 조립
   레벨3: 문장틀 빈칸을 [선택]으로 채우기
   레벨4: 문장틀 빈칸을 [직접 입력]으로 채우기 (한 일 문장 완성)
   레벨5: 한 일 문장 + 느낌 문장까지 스스로 쓰기
   ========================================================= */
const LEVELS = {
  1:'1단계 · 그림으로 한 일 고르기 (앱이 문장을 만들어 줍니다)',
  2:'2단계 · 한 일 + 어디서/누구랑 단어로 답하기',
  3:'3단계 · 문장 빈칸을 선택지로 채우기',
  4:'4단계 · 문장 빈칸을 직접 써 보기',
  5:'5단계 · 한 일 문장 + 느낌 문장까지 스스로 쓰기'
};

/* ---------- 오늘 날짜 ---------- */
function todayKey(){
  const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function prettyDate(k){
  const [y,m,dd]=k.split('-'); const wd=['일','월','화','수','목','금','토'][new Date(k).getDay()];
  return `${m}월 ${dd}일 (${wd})`;
}

/* =========================================================
   학생 플로우 상태
   ========================================================= */
let flow=[];      // 이번 세션의 단계 배열
let idx=0;        // 현재 단계 인덱스
let answer={};    // 수집된 답 {act, place, people, feeling, sentence, feelSentence}

const $=id=>document.getElementById(id);

/* 레벨별 질문 흐름 만들기 */
function buildFlow(){
  const lv = DB.level;
  answer = {};
  if(lv===1){
    flow = ['act','composeShow'];
  }else if(lv===2){
    flow = ['act','place','people','composeShow'];
  }else if(lv===3){
    flow = ['act','fillSelect'];
  }else if(lv===4){
    flow = ['act','fillType'];
  }else{ // 5
    flow = ['act','fillType','feelWrite'];
  }
  idx=0;
}

/* ---------- 화면 렌더 ---------- */
function renderStudent(){
  $('dateChip').textContent = prettyDate(todayKey());
  // 진행 점
  const dots=$('stepDots'); dots.innerHTML='';
  flow.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i<idx?' done':i===idx?' on':'');
    dots.appendChild(d);
  });
  const step=flow[idx];
  const c=$('content'); c.innerHTML='';

  if(step==='act'){
    $('qhint').textContent='첫 번째 질문';
    $('question').textContent='오늘 무엇을 했어요?';
    c.appendChild(makeGrid(getActs(),'act',3));
    setBar(true);
  }
  else if(step==='place'){
    $('qhint').textContent='두 번째 질문';
    $('question').textContent='어디에서 했어요?';
    c.appendChild(makeGrid(PLACES,'place',3));
    setBar(true);
  }
  else if(step==='people'){
    $('qhint').textContent='세 번째 질문';
    $('question').textContent='누구와 함께 했어요?';
    c.appendChild(makeGrid(PEOPLE,'people',3));
    setBar(true);
  }
  else if(step==='composeShow'){
    $('qhint').textContent='다 골랐어요';
    $('question').textContent='이렇게 문장이 되었어요!';
    const p=document.createElement('div'); p.className='preview';
    p.innerHTML = composeSentence();
    c.appendChild(p);
    const help=document.createElement('p'); help.className='muted';
    help.style.marginTop='14px';
    help.textContent='소리 내어 한 번 읽어 볼까요? 다 되었으면 완성을 눌러요.';
    c.appendChild(help);
    setBar(true, true); // 완성 버튼
  }
  else if(step==='fillSelect'){
    // 문장틀: "나는 오늘 [장소]에서 [활동] 했어요." — 선택으로 채움
    $('qhint').textContent='문장 만들기';
    $('question').textContent='빈칸을 골라서 채워 보세요.';
    const p=document.createElement('div'); p.className='preview'; p.id='tpl';
    c.appendChild(p);
    const g1label=document.createElement('p'); g1label.className='qhint'; g1label.style.marginTop='16px'; g1label.textContent='① 어디에서?';
    c.appendChild(g1label);
    c.appendChild(makeGrid(PLACES,'place',3,updateTpl));
    const g2label=document.createElement('p'); g2label.className='qhint'; g2label.style.marginTop='14px'; g2label.textContent='② 어떤 느낌?';
    c.appendChild(g2label);
    c.appendChild(makeGrid(FEELINGS,'feeling',2,updateTpl));
    updateTpl();
    setBar(true, true);
  }
  else if(step==='fillType'){
    // 문장틀 빈칸을 직접 입력
    $('qhint').textContent='문장 만들기';
    $('question').textContent='빈칸에 직접 써 보세요.';
    const base = stripEmoji(answer.act||'').replace('했어요','').replace('갔어요','간 것').trim();
    const p=document.createElement('div'); p.className='preview';
    p.innerHTML = `나는 오늘 <input class="type" id="inpPlace" placeholder="어디에서?" style="display:inline-block;width:150px;font-size:20px;padding:6px 10px;"> 에서 `+
                  `<b>${escapeHtml(actPhrase())}</b>`;
    c.appendChild(p);
    const q2=document.createElement('p'); q2.className='qhint'; q2.style.marginTop='16px'; q2.textContent='그때 어땠는지 한 단어로 써 볼까요? (예: 즐거웠다)';
    c.appendChild(q2);
    const inp=document.createElement('input'); inp.className='type'; inp.id='inpFeelWord'; inp.placeholder='느낌 한 단어';
    c.appendChild(inp);
    setBar(true, true);
  }
  else if(step==='feelWrite'){
    // 느낌/생각을 문장으로
    $('qhint').textContent='마지막 질문';
    $('question').textContent='오늘 기분이나 생각을 한 문장으로 써 보세요.';
    const hint=document.createElement('p'); hint.className='muted';
    hint.innerHTML='예시를 골라 참고해도 좋아요:';
    c.appendChild(hint);
    c.appendChild(makeGrid(FEELINGS,'feeling',2,(v)=>{
      const t=$('feelText'); if(t){ t.value='나는 오늘 '+stripEmoji(v).trim().replace('요','다')+'.'; toggleNext(); }
    }));
    const ta=document.createElement('textarea'); ta.className='type'; ta.id='feelText'; ta.placeholder='여기에 써 보세요';
    ta.style.marginTop='14px';
    ta.addEventListener('input', toggleNext);
    c.appendChild(ta);
    setBar(true, true);
  }
}

/* 선택 카드 그리드 만들기 */
function makeGrid(items, field, cols, cb){
  const g=document.createElement('div'); g.className='grid'+(cols===3?' three':'');
  items.forEach(it=>{
    const [emo,...rest]=it.split(' ');
    const lbl=rest.join(' ');
    const el=document.createElement('div'); el.className='choice';
    el.innerHTML=`<span class="emo">${emo}</span><span class="lbl">${escapeHtml(lbl)}</span>`;
    if(answer[field]===it) el.classList.add('sel');
    el.onclick=()=>{
      answer[field]=it;
      [...g.children].forEach(ch=>ch.classList.remove('sel'));
      el.classList.add('sel');
      if(cb) cb(it);
      toggleNext();
    };
    g.appendChild(el);
  });
  return g;
}

/* 문장 조립 (레벨1·2) */
function composeSentence(){
  let s='나는 오늘 ';
  if(answer.place) s+=`<b>${stripEmoji(answer.place).trim()}</b>에서 `;
  s+=`<b>${actPhrase()}</b>`;
  if(answer.people){
    const pp=stripEmoji(answer.people).trim();
    if(pp==='혼자') s = s.replace('나는 오늘 ', '나는 오늘 혼자 ');
    else s+=` (${pp}와 함께)`;
  }
  return s+'.';
}
function actPhrase(){
  return stripEmoji(answer.act||'무엇인가를 했어요').trim();
}

/* 문장틀(레벨3) 실시간 갱신 */
function updateTpl(){
  const p=$('tpl'); if(!p) return;
  const place = answer.place ? `<b>${stripEmoji(answer.place).trim()}</b>` : `<span class="blank">어디에서</span>`;
  const feel = answer.feeling ? `<b>${stripEmoji(answer.feeling).trim().replace('요','다')}</b>` : `<span class="blank">느낌</span>`;
  p.innerHTML = `나는 오늘 ${place}에서 <b>${escapeHtml(actPhrase())}</b> 그래서 ${feel}.`;
}

/* ---------- 하단 버튼 ---------- */
function setBar(showNext, isFinal){
  const bar=$('bar'); bar.innerHTML='';
  if(idx>0){
    const b=document.createElement('button'); b.className='btn back'; b.textContent='← 뒤로';
    b.onclick=()=>{ idx--; renderStudent(); };
    bar.appendChild(b);
  }
  const n=document.createElement('button');
  n.className='btn '+(isFinal?'done':'next');
  n.id='nextBtn';
  n.textContent = isFinal ? '완성! ✓' : '다음 →';
  n.onclick = isFinal ? finish : goNext;
  bar.appendChild(n);
  toggleNext();
}
/* 다음 버튼 활성/비활성: 이번 단계에 필요한 답이 있어야 진행 */
function toggleNext(){
  const btn=$('nextBtn'); if(!btn) return;
  const step=flow[idx]; let ok=true;
  if(step==='act') ok=!!answer.act;
  else if(step==='place') ok=!!answer.place;
  else if(step==='people') ok=!!answer.people;
  else if(step==='feelWrite'){ const t=$('feelText'); ok=t && t.value.trim().length>0; }
  btn.disabled=!ok;
}
function goNext(){
  // fillType 단계 값 수집
  if(flow[idx]==='fillType'){
    const pl=$('inpPlace'); const fw=$('inpFeelWord');
    if(pl) answer.placeText=pl.value.trim();
    if(fw) answer.feelWord=fw.value.trim();
  }
  if(idx<flow.length-1){ idx++; renderStudent(); }
}

/* ---------- 완성 & 저장 ---------- */
function finalSentence(){
  const step=flow[idx];
  if(DB.level<=2){
    return htmlToText(composeSentence());
  }else if(DB.level===3){
    return htmlToText($('tpl').innerHTML);
  }else if(DB.level===4){
    const pl=($('inpPlace')?$('inpPlace').value.trim():answer.placeText)||'';
    const fw=($('inpFeelWord')?$('inpFeelWord').value.trim():answer.feelWord)||'';
    let s=`나는 오늘 ${pl?pl+'에서 ':''}${actPhrase()}`;
    if(fw) s+=` 그때 ${fw}.`; else s+='.';
    return s;
  }else{ // 5
    const pl=($('inpPlace')?$('inpPlace').value.trim():answer.placeText)||'';
    let s=`나는 오늘 ${pl?pl+'에서 ':''}${actPhrase()}`;
    const feel=($('feelText')?$('feelText').value.trim():'')||'';
    return s + (feel? ' '+feel : '.');
  }
}
function finish(){
  // fillType 값 최종 수집
  if(flow[idx]==='fillType'){
    const pl=$('inpPlace'); const fw=$('inpFeelWord');
    if(pl) answer.placeText=pl.value.trim();
    if(fw) answer.feelWord=fw.value.trim();
  }
  const text=finalSentence();
  DB.entries[todayKey()]={ text, emo:(answer.act||'📝').split(' ')[0], ts:Date.now(), level:DB.level };
  save();
  $('finalText').textContent=text;
  const msgs=['정말 잘했어요!','오늘도 해냈어요!','멋진 일기예요!','한 걸음 더 나아갔어요!'];
  $('cheerMsg').textContent=msgs[Math.floor(Math.random()*msgs.length)];
  $('cheer').classList.add('show');
}

/* ---------- 칭찬 닫기 → 기록 화면 ---------- */
$('cheerClose').onclick=()=>{ $('cheer').classList.remove('show'); showView('diary'); };

/* =========================================================
   기록(달력) 화면
   ========================================================= */
function renderDiary(){
  const now=new Date(); const y=now.getFullYear(), m=now.getMonth();
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const cal=$('calendar'); cal.innerHTML='';
  ['일','월','화','수','목','금','토'].forEach(h=>{
    const el=document.createElement('div'); el.className='cell head'; el.textContent=h; cal.appendChild(el);
  });
  for(let i=0;i<first;i++){ const e=document.createElement('div'); e.className='cell'; e.style.border='none'; cal.appendChild(e); }
  for(let d=1; d<=days; d++){
    const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const e=document.createElement('div'); e.className='cell';
    if(DB.entries[k]){ e.classList.add('has'); e.textContent=d; e.onclick=()=>scrollToEntry(k); }
    else e.textContent=d;
    cal.appendChild(e);
  }
  // 목록
  const list=$('diaryList'); list.innerHTML='';
  const keys=Object.keys(DB.entries).sort().reverse();
  if(!keys.length){ list.innerHTML='<div class="card muted">아직 쓴 일기가 없어요. 오늘의 일기를 써 볼까요?</div>'; return; }
  keys.forEach(k=>{
    const en=DB.entries[k];
    const d=document.createElement('div'); d.className='diaryitem'; d.id='e-'+k;
    d.innerHTML=`<div class="d">${en.emo||'📝'} ${prettyDate(k)}</div><div class="t">${escapeHtml(en.text)}</div>`;
    list.appendChild(d);
  });
}
function scrollToEntry(k){ const el=$('e-'+k); if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.borderColor='#5b8def'; } }

/* =========================================================
   교사/보호자 화면
   ========================================================= */
function renderTeacher(){
  const keys=Object.keys(DB.entries);
  $('stTotal').textContent=keys.length;
  $('stStreak').textContent=calcStreak();
  $('stLevel').textContent=DB.level;
  // 레벨 버튼
  const lb=$('lvlBtns'); lb.innerHTML='';
  Object.keys(LEVELS).forEach(lv=>{
    const b=document.createElement('button'); b.textContent=lv+'단계';
    if(+lv===DB.level) b.classList.add('cur');
    b.onclick=()=>{ DB.level=+lv; save(); renderTeacher(); };
    lb.appendChild(b);
  });
  $('lvlDesc').textContent=LEVELS[DB.level];
  $('actEditor').value=getActs().join('\n');
}
function calcStreak(){
  let s=0; const d=new Date();
  while(true){
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(DB.entries[k]){ s++; d.setDate(d.getDate()-1); } else break;
  }
  return s;
}
$('saveActs').onclick=()=>{
  const lines=$('actEditor').value.split('\n').map(x=>x.trim()).filter(Boolean);
  DB.activities=lines; save(); alert('활동 목록을 저장했어요.');
};
$('resetBtn').onclick=()=>{
  if(confirm('정말 모든 기록을 지울까요? 되돌릴 수 없어요.')){
    DB={level:DB.level, entries:{}, activities:DB.activities}; save(); renderTeacher(); alert('기록을 지웠어요.');
  }
};

/* =========================================================
   화면 전환
   ========================================================= */
function showView(v){
  $('studentView').classList.toggle('hidden', v!=='student');
  $('diaryView').classList.toggle('hidden', v!=='diary');
  $('teacherView').classList.toggle('hidden', v!=='teacher');
  $('bar').style.display = (v==='student') ? 'flex' : 'none';
  if(v==='student'){ $('appTitle').textContent='오늘의 일기'; buildFlow(); renderStudent(); }
  if(v==='diary'){ $('appTitle').textContent='내 일기'; renderDiary(); addBottomNav(); }
  if(v==='teacher'){ $('appTitle').textContent='교사·보호자'; renderTeacher(); addBottomNav(); }
}
/* 기록/교사 화면 하단 이동 버튼 */
function addBottomNav(){
  const bar=$('bar'); bar.style.display='flex'; bar.innerHTML='';
  const home=document.createElement('button'); home.className='btn next'; home.textContent='오늘의 일기 쓰기';
  home.onclick=()=>showView('student'); bar.appendChild(home);
}
$('teacherLink').onclick=()=>{
  // 교사 화면은 간단한 잠금(어른 확인용)
  const a=prompt('보호자·교사 확인:  3 + 4 = ?');
  if(a && a.trim()==='7'){ showView('teacher'); }
  else if(a!==null){ alert('숫자를 다시 확인해 주세요.'); }
};

/* =========================================================
   유틸
   ========================================================= */
function stripEmoji(s){ return s.replace(/^[^\uAC00-\uD7A3a-zA-Z]+/,'').trim(); }
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function htmlToText(h){ const t=document.createElement('div'); t.innerHTML=h; return t.textContent.replace(/\s+/g,' ').trim(); }

/* ---------- 시작 ---------- */
showView('student');
</script>
